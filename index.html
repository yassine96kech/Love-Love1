<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Love Game 💖</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: radial-gradient(circle at top, #ff7aa2, #ff2e63);
  height: 100vh;
  overflow: hidden;
  display: flex;
  justify-content: center;
  align-items: center;
  text-align: center;
}

/* Card */
.container {
  background: rgba(255,255,255,0.95);
  padding: 40px;
  border-radius: 25px;
  box-shadow: 0 20px 50px rgba(0,0,0,0.3);
}

h1 {
  color: #ff2e63;
}

/* Buttons */
.buttons {
  margin-top: 20px;
}

button {
  padding: 12px 25px;
  margin: 10px;
  border: none;
  cursor: pointer;
  font-size: 16px;
  border-radius: 25px;
  transition: 0.3s;
}

#yesBtn {
  background: #ff2e63;
  color: white;
}

#yesBtn:hover {
  transform: scale(1.1);
}

#noBtn {
  background: transparent;
  border: 2px solid #ff2e63;
  color: #ff2e63;
  position: relative;
}

/* Result */
#result {
  margin-top: 20px;
  font-size: 20px;
}

/* Hearts */
.heart {
  position: absolute;
  color: white;
  animation: float 6s linear infinite;
}

@keyframes float {
  from {transform: translateY(100vh); opacity:1;}
  to {transform: translateY(-10vh); opacity:0;}
}
</style>
</head>

<body>

<div class="container">
  <h1>WASH KATBGHINI? ❤️</h1>
  <div style="font-size:80px;">🧸</div>

  <div class="buttons">
    <button id="yesBtn">AH 😍</button>
    <button id="noBtn">LA 😏</button>
  </div>

  <div id="result"></div>
</div>

<script>
const yesBtn = document.getElementById("yesBtn");
const noBtn = document.getElementById("noBtn");
const result = document.getElementById("result");

let dodgeCount = 0;

/* YES button */
yesBtn.onclick = () => {
  result.innerHTML = "😍 ANA YASSINE TANBGHIK BZZAF ❤️";
};

/* NO button logic */
noBtn.addEventListener("mouseover", () => {
  if (dodgeCount < 5) {
    const x = Math.random() * (window.innerWidth - 120);
    const y = Math.random() * (window.innerHeight - 60);

    noBtn.style.position = "absolute";
    noBtn.style.left = x + "px";
    noBtn.style.top = y + "px";

    dodgeCount++;
  } else {
    noBtn.style.position = "static";
    noBtn.innerText = "صافي سمحيليا و تنتمنى ليك توفيق فحياتك  😭";
  }
});

/* Hearts animation */
function createHeart() {
  const heart = document.createElement("div");
  heart.classList.add("heart");
  heart.innerHTML = "💖";
  heart.style.left = Math.random() * 100 + "vw";
  heart.style.fontSize = Math.random() * 20 + 10 + "px";

  document.body.appendChild(heart);

  setTimeout(() => {
    heart.remove();
  }, 6000);
}

setInterval(createHeart, 400);
</script>

</body>
</html>
