<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Love Page Premium</title>

<style>
body {
  margin: 0;
  font-family: 'Segoe UI', sans-serif;
  background: radial-gradient(circle at top, #ff9eb5, #ff4d6d);
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
  overflow: hidden;
  text-align: center;
}

/* كارد فاخر */
.container {
  background: rgba(255,255,255,0.95);
  padding: 40px;
  border-radius: 25px;
  box-shadow: 0 20px 50px rgba(0,0,0,0.2);
  backdrop-filter: blur(10px);
  animation: fadeIn 1.5s ease;
}

@keyframes fadeIn {
  from {opacity:0; transform: scale(0.8);}
  to {opacity:1; transform: scale(1);}
}

h1 {
  color: #ff2e63;
  font-size: 28px;
}

/* الأزرار */
.buttons {
  margin-top: 25px;
}

button {
  padding: 14px 28px;
  margin: 10px;
  border: none;
  cursor: pointer;
  font-size: 16px;
  border-radius: 30px;
  transition: 0.3s;
}

/* زر نعم */
#yesBtn {
  background: linear-gradient(45deg, #ff2e63, #ff7b9c);
  color: white;
  box-shadow: 0 0 15px rgba(255,0,90,0.6);
}

#yesBtn:hover {
  transform: scale(1.1);
}

/* زر لا */
#noBtn {
  background: transparent;
  border: 2px solid #ff2e63;
  color: #ff2e63;
  position: relative;
}

/* النتيجة */
#result {
  margin-top: 25px;
  font-size: 22px;
  color: #333;
  animation: fadeIn 0.5s ease;
}

/* القلوب */
.heart {
  position: absolute;
  color: rgba(255,255,255,0.8);
  animation: float 6s linear infinite;
}

@keyframes float {
  from { transform: translateY(100vh) scale(0.5); opacity:1;}
  to { transform: translateY(-10vh) scale(1.5); opacity:0;}
}
</style>
</head>

<body>

<div class="container">
  <h1>WASH KATBGHINI? ❤️</h1>
  <div style="font-size:90px;">🧸</div>

  <div class="buttons">
    <button id="yesBtn">AH 😍</button>
    <button id="noBtn">LA 😏</button>
  </div>

  <div id="result"></div>
</div>

<!-- صوت -->
<audio id="loveSound" src="https://www.soundjay.com/buttons/sounds/button-3.mp3"></audio>

<script>
const yesBtn = document.getElementById("yesBtn");
const noBtn = document.getElementById("noBtn");
const result = document.getElementById("result");
const sound = document.getElementById("loveSound");

/* نعم */
yesBtn.onclick = () => {
  sound.play();
  result.innerHTML = "😍 ANA TANBGHIK BZZAF ❤️<br>نتمنى نبقاو ديما مع بعض 💕";
};

/* لا */
noBtn.onclick = () => {
  result.innerHTML = "😢<br>يمكن ماشي الوقت المناسب... ولكن أنا باقي كنتمناك 💔";
};

/* زر لا يهرب */
noBtn.addEventListener("mouseover", () => {
  const x = Math.random() * (window.innerWidth - 120);
  const y = Math.random() * (window.innerHeight - 60);
  noBtn.style.position = "absolute";
  noBtn.style.left = x + "px";
  noBtn.style.top = y + "px";
});

/* القلوب */
function createHeart() {
  const heart = document.createElement("div");
  heart.classList.add("heart");
  heart.innerHTML = "💖";
  heart.style.left = Math.random() * 100 + "vw";
  heart.style.fontSize = Math.random() * 25 + 10 + "px";
  document.body.appendChild(heart);

  setTimeout(() => {
    heart.remove();
  }, 6000);
}

setInterval(createHeart, 300);
</script>

</body>
</html>
